default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  username: <%= ENV.fetch('DB_USERNAME', 'default_user') %>
  password: <%= ENV.fetch('DB_PASSWORD', 'default_pass') %>
  host: <%= ENV.fetch('DB_HOST', 'localhost') %>

development:
  <<: *default
  database: my_api_development

test:
  <<: *default
  database: my_api_test

# production:
#   primary:
#     <<: *default
#     database: my_api_production
#     url: <%= ENV['DATABASE_URL'] %>

#   queue:
#     <<: *default
#     database: my_api_queue_production
production:
  adapter: postgresql
  encoding: unicode
  url: <%= ENV["DATABASE_URL"] %>
  pool: 5


  queue:
    adapter: postgresql
    encoding: unicode
    database: my_api_queue
    username: my_api_user
    password: my_api_password
    host: localhost
    pool: 5

  cache:
    adapter: postgresql
    encoding: unicode
    database: my_api_cache
    username: my_api_user
    password: my_api_password
    host: localhost
    pool: 5

default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  <<: *default
  database: my_api_development
  username: myapp
  password: <%= ENV.fetch("MY_API_DEVELOPMENT_PASSWORD", "avongs") %>
  host: localhost

test:
  <<: *default
  database: my_api_test
  username: myapp
  password: <%= ENV.fetch("MY_API_TEST_PASSWORD", "avongs") %>
  host: localhost

production:
  primary:
    <<: *default
    database: <%= ENV["DATABASE_NAME"] || "my_api_production" %>
    username: <%= ENV["DATABASE_USER"] || "myapp" %>
    password: <%= ENV["DATABASE_PASSWORD"] || "avongs" %>
    host: <%= ENV["DATABASE_HOST"] || "localhost" %>
    port: <%= ENV.fetch("DATABASE_PORT", 5432) %>
    

  cable:
    <<: *default
    database: <%= ENV["CABLE_DATABASE_NAME"] || "my_api_production_cable" %>
    username: <%= ENV["DATABASE_USER"] || "myapp" %>
    password: <%= ENV["DATABASE_PASSWORD"] || "avongs" %>
    host: <%= ENV["DATABASE_HOST"] || "localhost" %>
    port: <%= ENV.fetch("DATABASE_PORT", 5432) %>
    


  queue:
    <<: *default
    database: <%= ENV["CABLE_DATABASE_NAME"] || "my_api_production_queue" %>
    username: <%= ENV["DATABASE_USER"] || "myapp" %>
    password: <%= ENV["DATABASE_PASSWORD"] || "avongs" %>
    host: <%= ENV["DATABASE_HOST"] || "localhost" %>
    port: <%= ENV.fetch("DATABASE_PORT", 5432) %>
    


  cache:
    <<: *default
    database: <%= ENV["CABLE_DATABASE_NAME"] || "my_api_production_cache" %>
    username: <%= ENV["DATABASE_USER"] || "myapp" %>
    password: <%= ENV["DATABASE_PASSWORD"] || "avongs" %>
    host: <%= ENV["DATABASE_HOST"] || "localhost" %>
    port: <%= ENV.fetch("DATABASE_PORT", 5432) %>
    
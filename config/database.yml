# PostgreSQL. Versions 9.3 and up are supported.
#
# Install the pg driver:
#   gem install pg
# On macOS with Homebrew:
#   gem install pg -- --with-pg-config=/usr/local/bin/pg_config
# On Windows:
#   gem install pg
#       Choose the win32 build.
#       Install PostgreSQL and put its /bin directory on your path.
#
# Configure Using Gemfile
# gem "pg"

default: &default
  adapter: postgresql
  encoding: unicode
  # For details on connection pooling, see Rails configuration guide
  # https://guides.rubyonrails.org/configuring.html#database-pooling
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  <<: *default
  database: my_api_development
  username:  myapp
  password: <%= ENV.fetch("MY_API_DEVELOPMENT_PASSWORD", "avongs") %>
  host: localhost
  # port: 5432 # Uncomment if using a custom port


test:
  <<: *default
  database: my_api_test
  username:  myapp
  password: <%= ENV.fetch("MY_API_TEST_PASSWORD", "avongs") %>
  host: localhost


production:
  <<: *default
  database: my_api_production
  username: myapp
  password: <%= ENV.fetch("MY_API_PRODUCTION_PASSWORD", "avongs") %>
  host: localhost
